<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PureEats - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#0b1326",
                        "on-secondary-fixed-variant": "#005047",
                        "on-error": "#690005",
                        "on-tertiary": "#233143",
                        "on-tertiary-fixed": "#0d1c2d",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#004d44",
                        "surface-tint": "#ffb59d",
                        "surface-container-high": "#222a3d",
                        "on-tertiary-container": "#243344",
                        "primary-fixed-dim": "#ffb59d",
                        "on-primary-fixed-variant": "#832600",
                        "inverse-primary": "#ab3500",
                        "secondary-container": "#03c6b2",
                        "secondary-fixed": "#62fae3",
                        "secondary": "#44e2cd",
                        "surface-bright": "#31394d",
                        "on-background": "#dae2fd",
                        "on-tertiary-fixed-variant": "#39485a",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#5f1900",
                        "tertiary-fixed-dim": "#b9c8de",
                        "secondary-fixed-dim": "#3cddc7",
                        "on-surface-variant": "#e1bfb5",
                        "outline": "#a98a80",
                        "surface-container-low": "#131b2e",
                        "outline-variant": "#594139",
                        "surface-container-lowest": "#060e20",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#390c00",
                        "on-surface": "#dae2fd",
                        "primary": "#ffb59d",
                        "inverse-on-surface": "#283044",
                        "surface-variant": "#2d3449",
                        "tertiary": "#b9c8de",
                        "tertiary-container": "#8c9bb0",
                        "background": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "on-secondary-fixed": "#00201c",
                        "on-primary": "#5d1900",
                        "surface-container": "#171f33",
                        "surface": "#0b1326",
                        "on-secondary": "#003731",
                        "primary-container": "#ff6b35",
                        "tertiary-fixed": "#d4e4fa",
                        "primary-fixed": "#ffdbd0",
                        "surface-container-highest": "#2d3449"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xs": "4px",
                        "md": "24px",
                        "xl": "64px",
                        "gutter": "16px",
                        "margin": "24px",
                        "lg": "40px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "h1": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .neomorphic-base {
            box-shadow: 20px 20px 60px rgba(0, 0, 0, 0.4), -5px -5px 30px rgba(30, 41, 59, 0.5);
        }
        .neomorphic-inset {
            box-shadow: inset 4px 4px 8px rgba(0, 0, 0, 0.4), inset -4px -4px 8px rgba(30, 41, 59, 0.3);
            border: 1px solid transparent;
        }
        .neomorphic-inset:focus-within {
            border-color: #FF6B35;
        }
        .glass-overlay {
            background-color: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .btn-glow {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 0 4px 12px rgba(255, 107, 53, 0.3);
        }
        .segmented-active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4), inset -2px -2px 5px rgba(30,41,59,0.3);
            background: rgba(255, 107, 53, 0.1);
            color: #FF6B35;
            border: 1px solid rgba(255, 107, 53, 0.3);
        }
        .segmented-inactive {
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2), -2px -2px 5px rgba(30,41,59,0.2);
            color: var(--color-on-surface-variant);
            border: 1px solid transparent;
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-md font-body-md overflow-hidden relative">
<!-- Decorative background blobs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary-container opacity-5 blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-secondary-container opacity-5 blur-[150px] pointer-events-none"></div>
<main class="w-full max-w-[450px] z-10">
<!-- Header / Brand -->
<div class="text-center mb-lg">
<h1 class="font-display text-display text-primary-container tracking-tighter">PureEats</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Create Account</p>
<p class="font-body-md text-body-md text-tertiary-container">Join us today</p>
</div>
<!-- Registration Card -->
<div class="glass-overlay neomorphic-base rounded-[24px] p-lg flex flex-col gap-md">
<form class="flex flex-col gap-md">
<!-- Role Selection -->
<div class="flex flex-col gap-sm">
<label class="font-label-md text-label-md text-on-surface-variant">I am a...</label>
<div class="flex gap-sm p-xs bg-surface-container-low rounded-xl">
<button class="flex-1 py-sm rounded-lg font-label-md text-label-md segmented-active transition-all" type="button">
                            Customer
                        </button>
<button class="flex-1 py-sm rounded-lg font-label-md text-label-md segmented-inactive hover:bg-white/5 transition-all" type="button">
                            Owner
                        </button>
<button class="flex-1 py-sm rounded-lg font-label-md text-label-md segmented-inactive hover:bg-white/5 transition-all" type="button">
                            Admin
                        </button>
</div>
</div>
<!-- Input Fields -->
<div class="flex flex-col gap-sm">
<div class="neomorphic-inset bg-surface-container-low rounded-xl flex items-center px-md py-sm transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-sm" data-icon="person">person</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md p-0 outline-none" placeholder="Full Name" type="text"/>
</div>
<div class="neomorphic-inset bg-surface-container-low rounded-xl flex items-center px-md py-sm transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-sm" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md p-0 outline-none" placeholder="Email Address" type="email"/>
</div>
<div class="neomorphic-inset bg-surface-container-low rounded-xl flex items-center px-md py-sm transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-sm" data-icon="phone">phone</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md p-0 outline-none" placeholder="Phone Number" type="tel"/>
</div>
<div class="neomorphic-inset bg-surface-container-low rounded-xl flex items-center px-md py-sm transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-sm" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md p-0 outline-none" placeholder="Password" type="password"/>
<button class="text-on-surface-variant hover:text-primary-container transition-colors ml-sm flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<div class="neomorphic-inset bg-surface-container-low rounded-xl flex items-center px-md py-sm transition-colors">
<span class="material-symbols-outlined text-on-surface-variant mr-sm" data-icon="lock_reset">lock_reset</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder-on-surface-variant/50 focus:ring-0 font-body-md text-body-md p-0 outline-none" placeholder="Confirm Password" type="password"/>
</div>
</div>
<!-- Terms & Conditions -->
<label class="flex items-center gap-sm cursor-pointer mt-xs">
<div class="relative flex items-center justify-center w-5 h-5 rounded-md neomorphic-inset bg-surface-container-low">
<input class="opacity-0 absolute inset-0 cursor-pointer peer" type="checkbox"/>
<div class="w-3 h-3 rounded-sm bg-primary-container opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">I agree to the <a class="text-primary-container hover:underline" href="#">Terms &amp; Conditions</a></span>
</label>
<!-- Actions -->
<div class="mt-sm flex flex-col gap-md text-center">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-sm rounded-xl btn-glow hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                        Register
                    </button>
<p class="font-label-sm text-label-sm text-on-surface-variant">
                        Already have an account? <a class="text-primary-container hover:underline font-label-md" href="#">Log In</a>
</p>
</div>
</form>
</div>
</main>
</body></html>
