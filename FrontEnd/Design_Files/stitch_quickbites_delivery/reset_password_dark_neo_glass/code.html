<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                    },
                    "fontFamily": {

<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface-container-low/30 backdrop-blur-3xl border border-white/5 shadow-[0_20px_60px_-15px_rgba(0,0,0,0.8),inset_0_1px_1px_rgba(255,255,255,0.05)];
            }
            .neo-inset {
                @apply shadow-[inset_4px_4px_8px_rgba(0,0,0,0.6),inset_-1px_-1px_3px_rgba(255,255,255,0.03)];
            }
            .neo-push {
                @apply shadow-[4px_4px_10px_rgba(0,0,0,0.5),-2px_-2px_8px_rgba(30,41,59,0.3),inset_0_1px_1px_rgba(255,255,255,0.1)];
            }
        }
    </style>

<body class="bg-gradient-to-br from-surface-container-lowest via-surface-dim to-background min-h-screen flex items-center justify-center p-margin relative overflow-hidden">
<!-- Ambient Background Glows -->
<div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30vw] h-[30vw] bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Main Content Container -->
<main class="w-full max-w-[420px] relative z-10">
<!-- Success Alert Placeholder -->
<div class="mb-margin glass-panel rounded-lg p-sm flex items-center gap-sm border-secondary/20 bg-secondary-container/5 transform transition-all opacity-80 hover:opacity-100">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="flex-1">
<p class="font-label-md text-label-md text-secondary">Ready to reset</p>
<p class="font-body-md text-body-md text-secondary/70 text-[13px] leading-tight mt-0.5">Enter your new secure password below.</p>
</div>
<button class="text-outline hover:text-on-surface transition-colors p-xs rounded-full hover:bg-white/5">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<!-- Central Glass Card -->
<div class="glass-panel rounded-xl p-lg relative overflow-hidden">
<!-- Subtle top highlight for glass edge -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<!-- Header Section -->
<div class="text-center mb-xl">
<div class="w-16 h-16 mx-auto bg-surface-container-highest rounded-full neo-push flex items-center justify-center mb-margin border border-white/5">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">key</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs tracking-tight">Reset Password</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your new password</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-margin">
<!-- Password Input Group 1 -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">New Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">lock</span>
<input class="w-full bg-surface-container-lowest/80 text-on-surface font-body-md text-body-md pl-[44px] pr-xl py-sm rounded-lg border border-transparent neo-inset focus:border-primary-container/50 focus:bg-surface-container-lowest focus:ring-0 transition-all placeholder:text-outline-variant/60" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-xs flex items-center justify-center rounded-full hover:bg-white/5" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Password Input Group 2 -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline text-[20px] pointer-events-none">lock_reset</span>
<input class="w-full bg-surface-container-lowest/80 text-on-surface font-body-md text-body-md pl-[44px] pr-xl py-sm rounded-lg border border-transparent neo-inset focus:border-primary-container/50 focus:bg-surface-container-lowest focus:ring-0 transition-all placeholder:text-outline-variant/60" placeholder="••••••••" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-xs flex items-center justify-center rounded-full hover:bg-white/5" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Action Button -->
<button class="mt-sm w-full bg-primary-container text-surface-container-lowest font-label-md text-label-md py-sm rounded-lg relative overflow-hidden group shadow-[0_8px_20px_-5px_rgba(255,107,53,0.3)] hover:shadow-[0_12px_25px_-5px_rgba(255,107,53,0.4)] transition-all active:scale-[0.98] active:shadow-none" type="submit">
<!-- Subtle inner glow for top edge -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-white/30"></div>
<span class="relative z-10 flex items-center justify-center gap-2">
                        Reset Password
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</form>
<!-- Footer Action -->
<div class="mt-margin text-center">
<a class="inline-flex items-center gap-1 font-label-sm text-label-sm text-tertiary hover:text-primary transition-colors py-2 px-4 rounded-full hover:bg-white/5" href="#">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Return to Login
                </a>
</div>
</div>
</main>
</body></html>
