<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased bg-gradient-to-br from-surface-dim via-surface to-surface-container-lowest p-gutter md:p-margin">
<!-- Top Navigation (Suppressed per logic: Linear/Transactional intent, but keeping brand anchor minimal) -->
<header class="fixed top-0 w-full p-gutter flex justify-center items-center z-50">
<div class="text-2xl font-black tracking-tighter text-[#FF6B35] font-display">PureEats</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mx-auto relative z-10">
<!-- Verification Card -->
<div class="glass-panel neomorphic-base rounded-xl p-md md:p-lg flex flex-col items-center text-center relative overflow-hidden">

<div class="absolute -top-24 -left-24 w-48 h-48 bg-primary-container/20 rounded-full blur-[60px] pointer-events-none"></div>
<!-- Icon -->
<div class="w-16 h-16 rounded-full glass-panel flex items-center justify-center mb-md neomorphic-base text-primary-container border border-white/5">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<!-- Typography -->
<h1 class="font-h1 text-h1 text-inverse-surface mb-xs">Verify Your Identity</h1>
<p class="font-body-md text-body-md text-tertiary-container mb-lg max-w-[280px]">Enter the 6-digit code sent to your email.</p>
<!-- 2FA Inputs Form -->
<form class="w-full flex flex-col items-center">
<!-- Digits -->
<div class="flex justify-between w-full gap-2 mb-lg">
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
<input class="code-input w-12 h-14 md:w-14 md:h-16 rounded-lg neomorphic-inset border border-transparent text-center font-display text-display text-inverse-surface transition-all duration-200 bg-surface-container-low" maxlength="1" placeholder="·" type="text"/>
</div>

<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 px-6 rounded-lg neomorphic-button hover:bg-primary-fixed transition-colors active:scale-95 duration-200 mb-md flex items-center justify-center gap-2" type="button">
                    Verify
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
<!-- Secondary Actions -->
<div class="flex flex-col items-center gap-4 w-full mt-4 border-t border-white/5 pt-md">
<button class="font-label-sm text-label-sm text-tertiary hover:text-primary-container transition-colors">
                    Didn't receive code? <span class="text-primary-container font-bold">Resend</span>
</button>
