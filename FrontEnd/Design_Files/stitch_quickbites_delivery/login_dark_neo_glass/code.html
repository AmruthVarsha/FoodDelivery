<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PureEats - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#0b1326",
                        "on-secondary-fixed-variant": "#005047",
                        "on-error": "#690005",
                        "on-tertiary": "#233143",
                        "on-tertiary-fixed": "#0d1c2d",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#004d44",
                        "surface-tint": "#ffb59d",
                        "surface-container-high": "#222a3d",
                        "on-tertiary-container": "#243344",
                        "primary-fixed-dim": "#ffb59d",
                        "on-primary-fixed-variant": "#832600",
                        "inverse-primary": "#ab3500",
                        "secondary-container": "#03c6b2",
                        "secondary-fixed": "#62fae3",
                        "secondary": "#44e2cd",
                        "surface-bright": "#31394d",
                        "on-background": "#dae2fd",
                        "on-tertiary-fixed-variant": "#39485a",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#5f1900",
                        "tertiary-fixed-dim": "#b9c8de",
                        "secondary-fixed-dim": "#3cddc7",
                        "on-surface-variant": "#e1bfb5",
                        "outline": "#a98a80",
                        "surface-container-low": "#131b2e",
                        "outline-variant": "#594139",
                        "surface-container-lowest": "#060e20",
                        "error-container": "#93000a",
                        "on-primary-fixed": "#390c00",
                        "on-surface": "#dae2fd",
                        "primary": "#ffb59d",
                        "inverse-on-surface": "#283044",
                        "surface-variant": "#2d3449",
                        "tertiary": "#b9c8de",
                        "tertiary-container": "#8c9bb0",
                        "background": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "on-secondary-fixed": "#00201c",
                        "on-primary": "#5d1900",
                        "surface-container": "#171f33",
                        "surface": "#0b1326",
                        "on-secondary": "#003731",
                        "primary-container": "#ff6b35",
                        "tertiary-fixed": "#d4e4fa",
                        "primary-fixed": "#ffdbd0",
                        "surface-container-highest": "#2d3449"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xs": "4px",
                        "md": "24px",
                        "xl": "64px",
                        "gutter": "16px",
                        "margin": "24px",
                        "lg": "40px",
                        "unit": "8px"
                    },
                    "fontFamily": {
                        "h1": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h1": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "h2": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "display": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        .neomorphic-card {
            box-shadow: 20px 20px 60px #040810, -5px -5px 30px #1e293b;
        }
        .neomorphic-inset {
            box-shadow: inset 2px 2px 5px #000, inset -2px -2px 5px #1e293b;
        }
        .glass-overlay {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }
        .button-glow {
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3), 0 4px 15px rgba(255, 107, 53, 0.3);
        }
    </style>
</head>
<body class="bg-surface-dim min-h-screen flex items-center justify-center p-gutter relative overflow-hidden text-on-surface">
<!-- Decorative Gradient Blobs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-secondary-container/10 rounded-full blur-[150px] pointer-events-none"></div>
<main class="w-full max-w-[450px] relative z-10">
<!-- Logo Area -->
<div class="text-center mb-md">
<h1 class="font-display text-display text-primary-container tracking-tighter">PureEats</h1>
</div>
<!-- Glass/Neomorphic Card -->
<div class="neomorphic-card rounded-2xl bg-surface-container-low p-1 p-md relative overflow-hidden">
<!-- Glass Layer -->
<div class="absolute inset-0 glass-overlay rounded-2xl pointer-events-none"></div>
<div class="relative z-10 space-y-lg">
<!-- Header -->
<div class="text-center space-y-xs">
<h2 class="font-h2 text-h2 text-on-surface">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Login to your account</p>
</div>
<!-- Form -->
<form class="space-y-md">
<!-- Email Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant z-10">mail</span>
<input class="w-full neomorphic-inset bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant block ml-2" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant z-10">lock</span>
<input class="w-full neomorphic-inset bg-surface-container-highest border-none rounded-xl py-4 pl-12 pr-4 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:ring-1 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between px-2 pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative w-5 h-5 flex items-center justify-center neomorphic-inset bg-surface-container-highest rounded-full group-hover:ring-1 group-hover:ring-primary-container/50 transition-all">
<input class="opacity-0 absolute w-full h-full cursor-pointer peer" type="checkbox"/>
<span class="material-symbols-outlined text-[14px] text-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary-container hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-4 rounded-xl button-glow hover:bg-primary transition-colors active:scale-[0.98] duration-200" type="submit">
                            Login
                        </button>
</div>
</form>
<!-- Footer -->
<div class="text-center pt-md border-t border-white/5">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-label-md text-label-md text-primary-container hover:text-primary transition-colors ml-1" href="#">Register here</a>
</p>
</div>
</div>
</div>
</main>
</body></html>
