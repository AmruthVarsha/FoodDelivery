<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - PureEats</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

        }

                        "primary-fixed-dim": "#ffb59d",
                        "on-primary-fixed-variant": "#832600",
                        "inverse-primary": "#ab3500",
                        "secondary-container": "#03c6b2",
                        "secondary-fixed": "#62fae3",
                        "secondary": "#44e2cd",
                        "surface-bright": "#31394d",
                        "on-background": "#dae2fd",
                        "on-tertiary-fixed-variant": "#39485a",
                        "on-error-container": "#ffdad6",
                        "on-primary-container": "#5f1900",
                        "tertiary-fixed-dim": "#b9c8de",
                        "secondary-fixed-dim": "#3cddc7",
                        "on-surface-variant": "#e1bfb5",
                        "outline": "#a98a80",
                        "surface-container-low": "#131b2e",

                        "error-container": "#93000a",

                        "surface-variant": "#2d3449",
                        "tertiary": "#b9c8de",
                        "tertiary-container": "#8c9bb0",
                        "background": "#0b1326",
                        "inverse-surface": "#dae2fd",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "12px",
                        "xs": "4px",

                        "xl": "64px",
                        "gutter": "16px",

                    "fontFamily": {

                        "label-md": ["Plus Jakarta Sans"],

<body class="bg-surface-dim min-h-screen flex items-center justify-center p-md relative overflow-hidden bg-gradient-to-br from-surface-container-low to-surface-container-lowest">
<!-- Ambient Background Glows -->
<div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-secondary-container/5 rounded-full blur-[80px] pointer-events-none"></div>
<!-- Centered Glass Card -->
<main class="w-full max-w-md bg-surface-container/30 backdrop-blur-3xl border border-white/5 rounded-xl p-lg shadow-[20px_20px_60px_rgba(0,0,0,0.8),-5px_-5px_30px_rgba(30,41,59,0.3)] flex flex-col gap-margin relative z-10">
<!-- Brand/Header -->
<div class="text-center">
<div class="font-h2 text-h2 text-primary-container font-black tracking-tighter mb-sm">PureEats</div>
<h1 class="font-h1 text-h1 text-on-surface mb-xs">Forgot Password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your email to reset your password</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Input (Neomorphic Inset) -->
<div>
<label class="font-label-md text-label-md text-on-surface-variant mb-unit block" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant/70 z-10 pointer-events-none">mail</span>
<input class="w-full bg-surface-container-low text-on-surface font-body-md text-body-md rounded-lg py-sm pr-md pl-10 shadow-[inset_4px_4px_8px_rgba(0,0,0,0.6),inset_-2px_-2px_6px_rgba(255,255,255,0.02)] border border-transparent focus:border-primary-container/50 focus:ring-0 outline-none transition-all placeholder:text-on-surface-variant/30" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Primary Action Button (Neomorphic Pop) -->
<button class="w-full mt-xs py-sm px-md rounded-lg bg-primary-container text-on-primary-container font-label-md text-label-md flex justify-center items-center gap-xs shadow-[6px_6px_16px_rgba(0,0,0,0.5),-4px_-4px_12px_rgba(255,255,255,0.03)] hover:bg-[#ff7a4a] active:shadow-[inset_3px_3px_6px_rgba(0,0,0,0.4),inset_-2px_-2px_6px_rgba(255,255,255,0.1)] active:scale-[0.98] transition-all duration-200 border-t border-white/20" type="submit">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
                Send Reset Link
            </button>
</form>
<!-- Footer Link -->
<div class="text-center mt-sm">
<a class="inline-flex items-center gap-unit font-label-sm text-label-sm text-on-surface-variant hover:text-primary-container transition-colors group" href="#">
<span class="material-symbols-outlined text-[16px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                Back to Login
            </a>
</div>
</main>
</body></html>
