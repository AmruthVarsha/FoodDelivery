<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-gradient-to-br from-surface-container-low to-surface-container-lowest">
  <!-- Ambient Background Glows -->
  <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-secondary-container/5 rounded-full blur-[80px] pointer-events-none"></div>

  <!-- Centered Glass Card -->
  <main class="w-full max-w-md bg-surface-container/30 backdrop-blur-3xl border border-white/5 rounded-xl p-10 shadow-neomorphic flex flex-col gap-6 relative z-10">
    <!-- Brand/Header -->
    <div class="text-center">
      <div class="text-2xl font-black tracking-tighter mb-3 text-primary-container">QuickBites</div>
      <h1 class="text-3xl font-bold text-text-primary mb-1 tracking-tight">Forgot Password?</h1>
      <p class="text-base text-text-secondary">Enter your email to reset your password</p>
    </div>

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="p-4 rounded-xl text-sm bg-error-bg border border-error text-on-error-container">
        {{ errorMessage }}
      </div>
    }

    <!-- Success Alert -->
    @if (successMessage) {
      <div class="p-4 rounded-xl text-sm bg-secondary-container/20 border border-secondary text-secondary">
        {{ successMessage }}
      </div>
    }

    <!-- Form Area -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="text-sm font-semibold text-text-secondary mb-2 block">Email Address</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-text-secondary/70 z-10 pointer-events-none">mail</span>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="name@example.com"
            class="w-full bg-surface-container-low text-text-primary text-base rounded-lg py-3 pr-6 pl-10 shadow-neomorphic-inset border border-transparent focus:border-primary-container/50 focus:ring-0 outline-none transition-all placeholder:text-text-secondary/30"
          />
        </div>
        @if (hasError('email', 'required') || hasError('email', 'email')) {
          <span class="text-error text-sm mt-2 ml-2 block">Please enter a valid email address</span>
        }
      </div>

      <!-- Primary Action Button -->
      <button
        type="submit"
        class="w-full mt-1 py-3 px-6 rounded-lg bg-primary-container text-primary-dark text-sm font-semibold flex justify-center items-center gap-2 shadow-[6px_6px_16px_rgba(0,0,0,0.5),-4px_-4px_12px_rgba(255,255,255,0.03)] hover:bg-[#ff7a4a] active:shadow-neomorphic-inset active:scale-[0.98] transition-all duration-200 border-t border-white/20 disabled:opacity-60 disabled:cursor-not-allowed"
        [disabled]="isLoading"
      >
        <span class="material-symbols-outlined text-xl">lock_reset</span>
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <!-- Footer Link -->
    <div class="text-center mt-3">
      <a routerLink="/auth/login" class="inline-flex items-center gap-2 text-xs text-text-secondary hover:text-primary-container transition-colors group">
        <span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform">arrow_back</span>
        Back to Login
      </a>
    </div>
  </main>
</div>
