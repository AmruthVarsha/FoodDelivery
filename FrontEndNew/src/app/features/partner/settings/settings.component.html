<!-- Shared Partner Sidebar (includes top nav + side nav) -->
<app-partner-sidebar
  [selectedRestaurant]="selectedRestaurant"
  [restaurants]="restaurants"
  [restaurantName]="restaurantName"
  (restaurantSelected)="selectRestaurant($event)"
  (logoutClicked)="logout()">
</app-partner-sidebar>

<main class="md:ml-64 pt-24 px-6 pb-12 min-h-screen bg-background">
  <div class="max-w-4xl mx-auto">
    <h1 class="font-headline-lg text-headline-lg text-on-surface mb-8 animate-fade-in">Restaurant Settings</h1>
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="bg-surface-container-lowest rounded-[16px] p-8 text-center border border-surface-variant shadow-[0_4px_12px_rgba(181,28,0,0.06)]">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primary mx-auto"></div>
      <p class="font-body-md text-body-md text-on-surface-variant mt-4">Loading settings...</p>
    </div>
    
    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 p-4 bg-error-container border border-error rounded-xl text-on-error-container font-body-md text-body-md animate-slide-in-bottom">
      {{ errorMessage }}
    </div>
    
    <!-- Success Message -->
    <div *ngIf="successMessage" class="mb-4 p-4 bg-secondary-container border border-secondary rounded-xl text-on-secondary-container font-body-md text-body-md animate-slide-in-bottom">
      {{ successMessage }}
    </div>
    
    <!-- Settings Form -->
    <div *ngIf="!isLoading" class="bg-surface-container-lowest rounded-[16px] p-8 space-y-6 border border-surface-variant shadow-[0_4px_12px_rgba(181,28,0,0.06)] animate-fade-in">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Restaurant Name</label>
          <input [(ngModel)]="restaurant.name" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>
        
        <div class="md:col-span-2">
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Description</label>
          <textarea [(ngModel)]="restaurant.description" rows="3" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"></textarea>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Email</label>
          <input [(ngModel)]="restaurant.email" type="email" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>
        
        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Phone</label>
          <input [(ngModel)]="restaurant.phoneNumber" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div class="md:col-span-2 py-2 border-t border-surface-variant">
          <h3 class="font-headline-md text-headline-md text-on-surface mb-4">Location Details</h3>
        </div>

        <div class="md:col-span-2">
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Street Address</label>
          <input [(ngModel)]="restaurant.address.street" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">City</label>
          <input [(ngModel)]="restaurant.address.city" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">State</label>
          <input [(ngModel)]="restaurant.address.state" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div class="md:col-span-2">
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Pincode</label>
          <input [(ngModel)]="restaurant.address.pincode" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div class="md:col-span-2 py-2 border-t border-surface-variant">
          <h3 class="font-headline-md text-headline-md text-on-surface mb-4">Operational Settings</h3>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Opening Time (HH:mm)</label>
          <input [(ngModel)]="restaurant.openingTime" placeholder="09:00" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Closing Time (HH:mm)</label>
          <input [(ngModel)]="restaurant.closingTime" placeholder="22:00" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div>
          <label class="block font-label-lg text-label-lg text-on-surface font-semibold mb-2">Prep Time (minutes)</label>
          <input [(ngModel)]="restaurant.prepTimeMinutes" type="number" class="w-full px-4 py-3 rounded-xl bg-surface-container border border-surface-variant text-on-surface focus:ring-2 focus:ring-primary font-body-lg text-body-lg"/>
        </div>

        <div class="flex items-center justify-between pt-4">
          <span class="font-headline-md text-headline-md text-on-surface">Restaurant Status</span>
          <button (click)="restaurant.isOpen = !restaurant.isOpen" 
            [ngClass]="restaurant.isOpen 
              ? 'bg-green-600 text-white hover:bg-green-700' 
              : 'bg-gray-300 text-gray-700 hover:bg-gray-400'"
            class="px-6 py-2 rounded-full font-label-lg text-label-lg font-semibold shadow-md transition-all">
            {{ restaurant.isOpen ? 'Open' : 'Closed' }}
          </button>
        </div>
      </div>

      <div class="mt-6">
        <button 
          (click)="saveSettings()" 
          [disabled]="isLoading" 
          type="button"
          class="w-full py-4 px-6 bg-[#ff6b35] text-white font-semibold text-lg rounded-full hover:bg-[#ff8555] transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-md hover:shadow-lg active:scale-95 flex items-center justify-center gap-2">
          @if (isLoading) {
            <span class="material-symbols-outlined animate-spin">progress_activity</span>
            <span>Saving...</span>
          } @else {
            <span>Save Settings</span>
          }
        </button>
      </div>
    </div>
  </div>
</main>
