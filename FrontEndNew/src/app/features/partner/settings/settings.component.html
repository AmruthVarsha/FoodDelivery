<!-- Shared Partner Sidebar (includes top nav + side nav) -->
<app-partner-sidebar
  [selectedRestaurant]="selectedRestaurant"
  [restaurants]="restaurants"
  [restaurantName]="restaurantName"
  (restaurantSelected)="selectRestaurant($event)"
  (logoutClicked)="logout()">
</app-partner-sidebar>
<main class="md:ml-64 pt-24 px-6 pb-12 min-h-screen bg-gradient-to-br from-[#0a0a0a] via-[#1a1a1a] to-[#0a0a0a]">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-white mb-8">Restaurant Settings</h1>
    
    <!-- Loading State -->
    <div *ngIf="isLoading" class="glass-card rounded-2xl p-8 text-center">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#00ff88] mx-auto"></div>
      <p class="text-gray-400 mt-4">Loading settings...</p>
    </div>
    
    <!-- Error Message -->
    <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-500/10 border border-red-500/40 rounded-xl text-red-500">
      {{ errorMessage }}
    </div>
    
    <!-- Success Message -->
    <div *ngIf="successMessage" class="mb-4 p-4 bg-[#00ff88]/10 border border-[#00ff88]/40 rounded-xl text-[#00ff88]">
      {{ successMessage }}
    </div>
    
    <!-- Settings Form -->
    <div *ngIf="!isLoading" class="glass-card rounded-2xl p-8 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
          <label class="block text-sm font-bold text-gray-400 mb-2">Restaurant Name</label>
          <input [(ngModel)]="restaurant.name" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>
        
        <div class="md:col-span-2">
          <label class="block text-sm font-bold text-gray-400 mb-2">Description</label>
          <textarea [(ngModel)]="restaurant.description" rows="3" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"></textarea>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">Email</label>
          <input [(ngModel)]="restaurant.email" type="email" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>
        
        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">Phone</label>
          <input [(ngModel)]="restaurant.phoneNumber" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div class="md:col-span-2 py-2 border-t border-white/5">
          <h3 class="text-white font-bold mb-4">Location Details</h3>
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-bold text-gray-400 mb-2">Street Address</label>
          <input [(ngModel)]="restaurant.address.street" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">City</label>
          <input [(ngModel)]="restaurant.address.city" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">State</label>
          <input [(ngModel)]="restaurant.address.state" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-bold text-gray-400 mb-2">Pincode</label>
          <input [(ngModel)]="restaurant.address.pincode" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div class="md:col-span-2 py-2 border-t border-white/5">
          <h3 class="text-white font-bold mb-4">Operational Settings</h3>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">Opening Time (HH:mm)</label>
          <input [(ngModel)]="restaurant.openingTime" placeholder="09:00" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">Closing Time (HH:mm)</label>
          <input [(ngModel)]="restaurant.closingTime" placeholder="22:00" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-400 mb-2">Prep Time (minutes)</label>
          <input [(ngModel)]="restaurant.prepTimeMinutes" type="number" class="w-full px-4 py-3 rounded-xl bg-gray-900 border border-white/10 text-white focus:border-[#00ff88] focus:ring-1 focus:ring-[#00ff88]"/>
        </div>

        <div class="flex items-center justify-between pt-4">
          <span class="text-white font-bold">Restaurant Status</span>
          <button (click)="restaurant.isOpen = !restaurant.isOpen" class="px-6 py-2 rounded-xl font-bold" [class.bg-[#00ff88]]="restaurant.isOpen" [class.text-black]="restaurant.isOpen" [class.bg-gray-800]="!restaurant.isOpen" [class.text-gray-400]="!restaurant.isOpen">{{ restaurant.isOpen ? 'Open' : 'Closed' }}</button>
        </div>
      </div>

      <button (click)="saveSettings()" [disabled]="isLoading" class="w-full py-4 bg-[#00ff88] text-black font-bold rounded-xl hover:brightness-110 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isLoading ? 'Saving...' : 'Save Settings' }}
      </button>
    </div>
  </div>
</main>
