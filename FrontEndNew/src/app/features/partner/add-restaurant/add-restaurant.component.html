<div class="min-h-screen bg-gradient-to-br from-[#0a0a0a] via-[#1a1a1a] to-[#0a0a0a] pt-8 px-6 pb-12">
  <div class="max-w-3xl mx-auto">
    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-white mb-2">Add New Restaurant</h1>
        <p class="text-gray-400">Fill in the details below to register your restaurant.</p>
      </div>
    </header>

    @if (errorMessage) {
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg mb-6">
        {{ errorMessage }}
      </div>
    }

    <form [formGroup]="restaurantForm" (ngSubmit)="onSubmit()" class="glass-card p-8 rounded-2xl space-y-8">
      
      <!-- Basic Details -->
      <section>
        <h2 class="text-xl font-semibold text-[#00ff88] mb-4 border-b border-white/10 pb-2">Basic Details</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Restaurant Name *</label>
            <input type="text" formControlName="name" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="e.g. Burger King">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Phone Number *</label>
            <input type="text" formControlName="phoneNumber" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="10-digit number">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Email *</label>
            <input type="email" formControlName="email" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="contact@restaurant.com">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Logo URL</label>
            <input type="text" formControlName="logoUrl" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="https://...">
          </div>
          <div class="md:col-span-2 space-y-2">
            <label class="text-sm font-medium text-gray-300">Description</label>
            <textarea formControlName="description" rows="3" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="Briefly describe your restaurant..."></textarea>
          </div>
        </div>
      </section>

      <!-- Timings & Settings -->
      <section>
        <h2 class="text-xl font-semibold text-[#00ff88] mb-4 border-b border-white/10 pb-2">Timings & Settings</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Opening Time *</label>
            <input type="time" formControlName="openingTime" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00ff88] transition-colors">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Closing Time *</label>
            <input type="time" formControlName="closingTime" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00ff88] transition-colors">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Prep Time (mins) *</label>
            <input type="number" formControlName="prepTimeMinutes" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#00ff88] transition-colors">
          </div>
        </div>
      </section>

      <!-- Address -->
      <section formGroupName="address">
        <h2 class="text-xl font-semibold text-[#00ff88] mb-4 border-b border-white/10 pb-2">Address</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2 space-y-2">
            <label class="text-sm font-medium text-gray-300">Street *</label>
            <input type="text" formControlName="street" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="123 Main St">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">City *</label>
            <input type="text" formControlName="city" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">State *</label>
            <input type="text" formControlName="state" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors">
          </div>
          <div class="space-y-2">
            <label class="text-sm font-medium text-gray-300">Pincode *</label>
            <input type="text" formControlName="pincode" class="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-[#00ff88] transition-colors" placeholder="6-digit code">
          </div>
        </div>
      </section>

      <!-- Cuisines -->
      <section>
        <h2 class="text-xl font-semibold text-[#00ff88] mb-4 border-b border-white/10 pb-2">Cuisines *</h2>
        <div class="flex flex-wrap gap-3">
          @for (cuisine of availableCuisines; track cuisine.id) {
            <button type="button" 
                    (click)="toggleCuisine(cuisine.name)"
                    class="px-4 py-2 rounded-full border text-sm font-medium transition-all"
                    [class.bg-[#00ff88]/20]="selectedCuisineNames.has(cuisine.name)"
                    [class.border-[#00ff88]]="selectedCuisineNames.has(cuisine.name)"
                    [class.text-[#00ff88]]="selectedCuisineNames.has(cuisine.name)"
                    [class.bg-white/5]="!selectedCuisineNames.has(cuisine.name)"
                    [class.border-white/10]="!selectedCuisineNames.has(cuisine.name)"
                    [class.text-gray-400]="!selectedCuisineNames.has(cuisine.name)">
              {{ cuisine.name }}
            </button>
          }
        </div>
      </section>

      <!-- Submit -->
      <div class="pt-4 border-t border-white/10 flex justify-end">
        <button type="submit" [disabled]="isSubmitting" class="bg-[#00ff88] text-black px-8 py-3 rounded-xl font-bold hover:bg-[#00cc6a] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isSubmitting ? 'Submitting...' : 'Register Restaurant' }}
        </button>
      </div>
    </form>
  </div>
</div>
