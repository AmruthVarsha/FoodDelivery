<div class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden bg-background">
  <!-- Centered Glass Card -->
  <main class="w-full max-w-md bg-surface-container-lowest backdrop-blur-3xl border border-surface-variant rounded-[24px] p-10 shadow-[0_4px_12px_rgba(181,28,0,0.06)] flex flex-col gap-6 relative z-10">
    <!-- Brand/Header -->
    <div class="text-center">
      <div class="font-headline-lg text-headline-lg tracking-tighter mb-3 text-primary">Crave</div>
      <h1 class="font-headline-lg text-headline-lg text-on-surface mb-1">Forgot Password?</h1>
      <p class="font-body-md text-body-md text-on-surface-variant">Enter your email to reset your password</p>
    </div>

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="p-4 rounded-xl font-body-sm text-body-sm bg-error-container border border-error text-on-error-container">
        {{ errorMessage }}
      </div>
    }

    <!-- Success Alert -->
    @if (successMessage) {
      <div class="p-4 rounded-xl font-body-sm text-body-sm bg-secondary-container border border-secondary text-on-secondary-container">
        {{ successMessage }}
      </div>
    }

    <!-- Form Area -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-6">
      <!-- Email Input -->
      <div>
        <label for="email" class="font-label-sm text-label-sm font-semibold text-on-surface-variant mb-2 block">Email Address</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant z-10 pointer-events-none">mail</span>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="name@example.com"
            class="w-full bg-surface-container text-on-surface font-body-md text-body-md rounded-lg py-3 pr-6 pl-10 border border-surface-variant focus:border-primary focus:ring-2 focus:ring-primary/30 outline-none transition-all placeholder:text-on-surface-variant/50"
          />
        </div>
        @if (hasError('email', 'required') || hasError('email', 'email')) {
          <span class="text-error font-body-sm text-body-sm mt-2 ml-2 block">Please enter a valid email address</span>
        }
      </div>

      <!-- Primary Action Button -->
      <button
        type="submit"
        class="w-full mt-1 py-3 px-6 rounded-lg bg-primary text-on-primary font-label-lg text-label-lg font-semibold flex justify-center items-center gap-2 shadow-[0_4px_12px_rgba(181,28,0,0.2)] hover:bg-surface-tint active:scale-[0.98] transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed"
        [disabled]="isLoading"
      >
        <span class="material-symbols-outlined text-xl">lock_reset</span>
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </form>

    <!-- Footer Link -->
    <div class="text-center mt-3">
      <a routerLink="/auth/login" class="inline-flex items-center gap-2 font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors group">
        <span class="material-symbols-outlined text-base group-hover:-translate-x-1 transition-transform">arrow_back</span>
        Back to Login
      </a>
    </div>
  </main>
</div>
