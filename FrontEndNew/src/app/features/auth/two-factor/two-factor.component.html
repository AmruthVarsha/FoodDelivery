<!-- Main Full Screen Container -->
<main class="min-h-screen relative flex items-center justify-center p-margin-mobile md:p-margin-desktop overflow-hidden">
  <!-- Blurred Background Image -->
  <div class="absolute inset-0 z-0 bg-cover bg-center"
    style="background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1920&q=80');">
  </div>

  <!-- Dark Overlay for Contrast -->
  <div class="absolute inset-0 z-0 bg-inverse-surface/60 backdrop-blur-md"></div>

  <!-- Verification Card -->
  <div class="relative z-10 w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-level-2 p-8 md:p-10 flex flex-col items-center text-center gap-lg animate-scale-in">
    <!-- Icon -->
    <div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center">
      <span class="material-symbols-outlined text-3xl text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
    </div>

    <!-- Typography -->
    <div class="flex flex-col gap-sm">
      <h1 class="font-headline-lg text-headline-lg text-on-surface">Verify Your Identity</h1>
      <p class="font-body-md text-body-md text-on-surface-variant max-w-[320px]">Enter the 6-digit code sent to your email.</p>
    </div>

    <!-- Error Alert -->
    @if (errorMessage) {
      <div class="w-full p-4 rounded-xl text-sm bg-error-container border border-error text-on-error-container animate-slide-in-bottom">
        {{ errorMessage }}
      </div>
    }

    <!-- Success Alert -->
    @if (successMessage) {
      <div class="w-full p-4 rounded-xl text-sm bg-secondary-container/20 border border-secondary text-on-secondary-container animate-slide-in-bottom">
        {{ successMessage }}
      </div>
    }

    <!-- 2FA Inputs Form -->
    <form [formGroup]="twoFactorForm" (ngSubmit)="onSubmit()" class="w-full flex flex-col items-center gap-gutter">
      <!-- Digits -->
      <div class="flex justify-between w-full gap-2">
        @for (digit of code; track $index) {
          <input
            #codeInput
            type="text"
            maxlength="1"
            placeholder="·"
            [value]="digit"
            (input)="onCodeInput($event, $index)"
            (keydown)="onCodeKeyDown($event, $index)"
            (paste)="onCodePaste($event)"
            class="w-12 h-14 md:w-14 md:h-16 rounded-xl border-0 text-center text-4xl text-on-surface transition-all bg-surface-container focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest outline-none"
          />
        }
      </div>

      <!-- Primary Action -->
      <button
        type="submit"
        class="w-full mt-sm bg-primary text-on-primary font-label-lg text-label-lg rounded-full py-3.5 border-t border-white/20 hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
        [disabled]="isLoading"
      >
        @if (isLoading) {
          <span class="material-symbols-outlined animate-spin text-[18px]">autorenew</span>
          <span>Verifying...</span>
        } @else {
          <span>Verify</span>
          <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="relative flex items-center gap-4 py-xs">
      <div class="flex-grow border-t border-surface-variant"></div>
    </div>

    <!-- Secondary Actions -->
    <div class="flex flex-col items-center gap-sm w-full">
      <button
        type="button"
        (click)="resendCode()"
        class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
        [disabled]="isLoading"
      >
        Didn't receive code? <span class="text-primary font-semibold">Resend</span>
      </button>
      <a routerLink="/auth/login" class="font-label-sm text-label-sm flex items-center gap-1 text-primary hover:text-surface-tint transition-colors">
        <span class="material-symbols-outlined text-base">arrow_back</span>
        Back to Login
      </a>
    </div>
  </div>
</main>
