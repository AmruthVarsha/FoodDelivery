<div class="bg-background min-h-screen flex items-center justify-center antialiased bg-gradient-to-br from-surface-dim via-surface to-surface-container-lowest p-4 md:p-6">
  <!-- Top Navigation -->
  <header class="fixed top-0 w-full p-4 flex justify-center items-center z-50">
    <div class="text-2xl font-black tracking-tighter text-primary-container">QuickBites</div>
  </header>

  <!-- Main Content Canvas -->
  <main class="w-full max-w-md mx-auto relative z-10">
    <!-- Verification Card -->
    <div class="bg-surface-container/30 backdrop-blur-3xl border border-white/5 rounded-xl p-6 md:p-10 flex flex-col items-center text-center relative overflow-hidden shadow-neomorphic">
      <!-- Subtle decorative glow -->
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-primary-container/20 rounded-full blur-[60px] pointer-events-none"></div>

      <!-- Icon -->
      <div class="w-16 h-16 rounded-full bg-surface-container/30 backdrop-blur-3xl border border-white/5 flex items-center justify-center mb-6 shadow-neomorphic text-primary-container">
        <span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
      </div>

      <!-- Typography -->
      <h1 class="text-3xl font-bold text-inverse-surface mb-1">Confirm Your Email</h1>
      <p class="text-base text-tertiary-container mb-10 max-w-[280px]">Enter the 6-digit code sent to your email to verify your account.</p>

      <!-- Error Alert -->
      @if (errorMessage) {
        <div class="w-full p-4 rounded-xl mb-6 text-sm bg-error-bg border border-error text-on-error-container">
          {{ errorMessage }}
        </div>
      }

      <!-- Success Alert -->
      @if (successMessage) {
        <div class="w-full p-4 rounded-xl mb-6 text-sm bg-secondary-container/20 border border-secondary text-secondary">
          {{ successMessage }}
        </div>
      }

      <!-- Email Confirmation Form -->
      <form [formGroup]="confirmEmailForm" (ngSubmit)="onSubmit()" class="w-full flex flex-col items-center">
        <!-- Digits -->
        <div class="flex justify-between w-full gap-2 mb-10">
          @for (digit of code; track $index) {
            <input
              #codeInput
              type="text"
              maxlength="1"
              placeholder="·"
              [value]="digit"
              (input)="onCodeInput($event, $index)"
              (keydown)="onCodeKeyDown($event, $index)"
              (paste)="onCodePaste($event)"
              class="w-12 h-14 md:w-14 md:h-16 rounded-lg shadow-neomorphic-inset border border-transparent text-center text-5xl text-inverse-surface transition-all duration-200 bg-surface-container-low focus:border-primary-container focus:outline-none focus:ring-1 focus:ring-primary-container"
            />
          }
        </div>

        <!-- Primary Action -->
        <button
          type="submit"
          class="w-full bg-primary-container text-primary-dark text-sm font-semibold py-4 px-6 rounded-lg shadow-button-glow hover:bg-primary-fixed transition-colors active:scale-95 duration-200 mb-6 flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
          [disabled]="isLoading"
        >
          {{ isLoading ? 'Verifying...' : 'Confirm Email' }}
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        </button>
      </form>

      <!-- Secondary Actions -->
      <div class="flex flex-col items-center gap-4 w-full mt-4 border-t border-white/5 pt-6">
        <button
          type="button"
          (click)="resendCode()"
          class="text-xs text-tertiary hover:text-primary-container transition-colors"
          [disabled]="isLoading"
        >
          Didn't receive code? <span class="text-primary-container font-bold">Resend</span>
        </button>
        <a routerLink="/customer/profile" class="text-xs flex items-center gap-1 text-surface-variant hover:text-text-primary transition-colors">
          <span class="material-symbols-outlined text-base">arrow_back</span>
          Back to Profile
        </a>
      </div>
    </div>
  </main>
</div>
