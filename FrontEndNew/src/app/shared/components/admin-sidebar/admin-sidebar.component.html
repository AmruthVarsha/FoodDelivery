<!-- Admin Sidebar -->
<aside class="fixed left-0 top-0 h-full flex flex-col pt-20 w-64 bg-white border-r border-[#e5e7eb] shadow-sm z-40 hidden md:flex">
  <div class="px-6 mb-8">
    <div class="flex items-center gap-3">
      <div class="h-10 w-10 rounded-xl bg-[#fff5f2] flex items-center justify-center border border-[#ff6b35]/20">
        <span class="material-symbols-outlined text-[#ff6b35]">admin_panel_settings</span>
      </div>
      <div>
        <p class="font-inter text-xs uppercase tracking-widest font-semibold text-[#ff6b35]">System Admin</p>
        <p class="text-[10px] text-[#9ca3af] font-medium">Terminal Access</p>
      </div>
    </div>
  </div>

  <nav class="flex-1">
    <a routerLink="/admin/dashboard"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       [routerLinkActiveOptions]="{exact: true}"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">dashboard</span>
      Dashboard
    </a>
    <a routerLink="/admin/pending-approvals"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">verified_user</span>
      Pending Approvals
    </a>
    <a routerLink="/admin/user-management"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">group</span>
      User Management
    </a>
    <a routerLink="/admin/restaurant-management"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">restaurant</span>
      Restaurant Management
    </a>
    <a routerLink="/admin/order-management"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">receipt_long</span>
      Order Management
    </a>
    <a routerLink="/admin/reports"
       routerLinkActive="bg-[#fff5f2] text-[#ff6b35] border-r-4 border-[#ff6b35]"
       class="flex items-center px-6 py-4 text-[#6b7280] font-inter text-xs uppercase tracking-widest font-semibold hover:bg-[#f3f4f6] hover:text-[#1a1a1a] transition-colors duration-300">
      <span class="material-symbols-outlined mr-4">analytics</span>
      Reports
    </a>
  </nav>

  <div class="mt-auto p-6 border-t border-[#e5e7eb]">
    <button (click)="logout()"
            class="w-full flex items-center gap-4 text-red-600 hover:text-red-700 transition-colors font-inter text-xs uppercase tracking-widest font-semibold">
      <span class="material-symbols-outlined">logout</span>
      Logout
    </button>
  </div>
</aside>
