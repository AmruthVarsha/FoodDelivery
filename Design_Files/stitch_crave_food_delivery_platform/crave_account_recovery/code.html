<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crave - Password Recovery</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#ebf2f4",
                        "tertiary-fixed": "#ffe07e",
                        "primary-container": "#dc3214",
                        "secondary-fixed": "#6bfe9c",
                        "surface": "#f4fafd",
                        "on-primary": "#ffffff",
                        "primary": "#b51c00",
                        "surface-tint": "#ba1c00",
                        "tertiary-fixed-dim": "#ebc31d",
                        "surface-container": "#e8eff1",
                        "on-primary-container": "#fffbff",
                        "on-primary-fixed": "#3e0400",
                        "tertiary-container": "#cca700",
                        "tertiary": "#725c00",
                        "inverse-surface": "#2b3234",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#e2e9ec",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#4d3e00",
                        "surface-container-low": "#eef5f7",
                        "on-surface": "#161d1f",
                        "secondary-container": "#6bfe9c",
                        "on-primary-fixed-variant": "#8e1300",
                        "inverse-primary": "#ffb4a5",
                        "on-error": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#4ae183",
                        "surface-container-highest": "#dde4e6",
                        "outline-variant": "#e5bdb6",
                        "on-secondary-fixed-variant": "#005228",
                        "outline": "#916f69",
                        "on-tertiary-fixed": "#231b00",
                        "surface-variant": "#dde4e6",
                        "on-secondary-container": "#00743a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#564500",
                        "surface-bright": "#f4fafd",
                        "background": "#f4fafd",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d4dbdd",
                        "on-secondary-fixed": "#00210c",
                        "on-background": "#161d1f",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#5c403a",
                        "secondary": "#006d37",
                        "primary-fixed": "#ffdad3",
                        "primary-fixed-dim": "#ffb4a5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "4xl": "2rem"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "xl": "40px",
                        "unit": "4px",
                        "lg": "24px",
                        "margin-mobile": "20px",
                        "margin-desktop": "64px"
                    },
                    "fontFamily": {
                        "display-lg": ["Plus Jakarta Sans"],
                        "label-sm": ["Work Sans"],
                        "body-lg": ["Work Sans"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "body-md": ["Work Sans"],
                        "label-lg": ["Work Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-lg": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface min-h-screen flex items-center justify-center p-md md:p-xl antialiased">
<!-- Presentation Wrapper for side-by-side view -->
<div class="flex flex-col md:flex-row gap-xl w-full max-w-6xl justify-center items-center">
<!-- Screen 1: Forgot Password -->
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-4xl p-lg shadow-[0_20px_40px_-15px_rgba(220,50,20,0.08)] flex flex-col items-center text-center relative overflow-hidden border border-surface-container">
<!-- Contextual Back Action -->
<button aria-label="Go back" class="absolute top-lg left-lg p-sm text-on-surface-variant hover:text-primary transition-colors hover:bg-surface-container rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<!-- Visual Anchor -->
<div class="w-16 h-16 bg-primary-container/10 rounded-full flex items-center justify-center text-primary mb-lg mt-xl">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
</div>
<!-- Header Content -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Forgot Password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-sm">No worries, we'll send you reset instructions to get you back to your cravings.</p>
<!-- Interactive Form Area -->
<form class="w-full flex flex-col gap-lg">
<div class="flex flex-col text-left gap-xs relative">
<label class="font-label-lg text-label-lg text-on-surface sr-only" for="email-input">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full bg-surface-container-low border border-outline-variant/50 rounded-2xl py-md pl-[52px] pr-md font-body-md text-body-md text-on-surface focus:bg-surface-container-lowest focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-on-surface-variant/60" id="email-input" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary rounded-full py-md font-label-lg text-label-lg shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2),inset_0_2px_4px_rgba(255,255,255,0.3)] shadow-sm shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200" type="button">
                    Reset Password
                </button>
</form>
<!-- Secondary Action -->
<a class="font-label-lg text-label-lg text-on-surface-variant mt-xl hover:text-primary transition-colors flex items-center gap-xs" href="#">
                Back to log in
            </a>
</div>
<!-- Screen 2: Confirm Email (Success State) -->
<div class="w-full max-w-[420px] bg-surface-container-lowest rounded-4xl p-lg shadow-[0_20px_40px_-15px_rgba(220,50,20,0.08)] flex flex-col items-center text-center border border-surface-container">
<!-- Success Visual Anchor -->
<div class="w-24 h-24 bg-secondary-container/20 rounded-full flex items-center justify-center text-secondary mb-lg mt-lg relative">
<span class="material-symbols-outlined text-[48px]" style="font-variation-settings: 'FILL' 1;">mark_email_read</span>
<!-- Subtle physical badge detail -->
<div class="absolute -bottom-1 -right-1 w-10 h-10 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm">
<div class="w-8 h-8 bg-secondary rounded-full flex items-center justify-center text-on-secondary shadow-[inset_0_-1px_2px_rgba(0,0,0,0.2)]">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
</div>
<!-- Header Content -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Check your email</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl px-sm">
                We sent a password reset link to <br/>
<strong class="text-on-surface font-medium">alex@example.com</strong>
</p>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary rounded-full py-md font-label-lg text-label-lg mb-md shadow-[inset_0_-2px_4px_rgba(0,0,0,0.2),inset_0_2px_4px_rgba(255,255,255,0.3)] shadow-sm shadow-primary/30 hover:scale-[1.02] active:scale-[0.98] transition-transform duration-200" type="button">
                Open email app
            </button>
<!-- Contextual Help / Alternative Action -->
<div class="font-body-md text-body-md text-on-surface-variant mt-md bg-surface-container-low w-full rounded-2xl p-md flex flex-col items-center gap-xs">
                Didn't receive the email? 
                <button class="text-primary font-label-lg text-label-lg hover:underline underline-offset-4 decoration-primary/50 flex items-center gap-xs">
<span class="material-symbols-outlined text-[16px]">refresh</span> Click to resend
                </button>
</div>
<!-- Escape Hatch -->
<a class="font-label-lg text-label-lg text-on-surface-variant mt-xl hover:text-primary transition-colors flex items-center gap-xs" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to log in
            </a>
</div>
</div>
</body></html>
