<body class="bg-background min-h-screen flex text-on-surface">
<div class="hidden lg:flex lg:w-1/2 relative bg-surface-container-high overflow-hidden">
<img alt="Overhead view of a vibrant, freshly baked pizza with melting cheese and basil leaves on a rustic wooden table, bright warm lighting." class="absolute inset-0 w-full h-full object-cover" data-alt="Overhead view of a vibrant, freshly baked pizza with melting cheese and basil leaves on a rustic wooden table, bright warm lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAyG4pHFgd5oBiFChoO1fUJBc8iPO0pVdnBHp-mQChDLzsCYYTaetI1Jt8ea8oMCbBdNRBtz23djoY5-082wqBCkyB91dWY9-BqQe-R4nbsfgACK5KB-MDzZUg_SJUILWZCjZTOWiL6-JHY36BJfwb-xGsmb1q5r5tE4UvK7Zxs6iVdVNjBccmuNX6XNURLUzbx6E5L1kn_Rybyz72OXFYm4aShdUwVt97Z8JoaPvnMiRK8YE67NmS2_Fx5uiJ8gq093jS_3LFoOdg"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-background/80 via-transparent to-transparent"></div>
<div class="absolute bottom-xl left-margin-desktop right-margin-desktop">
<h2 class="font-display-lg text-display-lg text-on-primary mb-md">Crave it.<br/>Get it.</h2>
<p class="font-body-lg text-body-lg text-on-primary/90">Join thousands of food lovers enjoying fast, reliable delivery from top local restaurants.</p>
</div>
</div>
<div class="w-full lg:w-1/2 flex items-center justify-center p-margin-mobile lg:p-margin-desktop overflow-y-auto">
<div class="w-full max-w-[440px] flex flex-col">
<div class="mb-xl text-center lg:text-left">
<span class="inline-block font-display-lg text-[28px] leading-[36px] font-black tracking-tighter text-primary mb-xl">Crave</span>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-sm">Create your account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Step 1 of 2: Account Details</p>
</div>
<div class="flex gap-sm mb-xl">
<div class="h-[6px] flex-1 bg-primary rounded-full"></div>
<div class="h-[6px] flex-1 bg-surface-variant rounded-full"></div>
</div>
<form class="flex flex-col gap-lg">
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="email" placeholder="jane@example.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-lg text-label-lg text-on-surface" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md pr-[48px] font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant mt-xs">Must be at least 8 characters long.</p>
</div>
<button class="mt-sm w-full bg-primary text-on-primary rounded-full py-md px-lg font-label-lg text-label-lg hover:bg-surface-tint active:scale-[0.98] transition-all flex items-center justify-center gap-sm shadow-md shadow-primary/20" type="button">
                    Continue to Delivery Info
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<p class="mt-xl text-center font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="font-label-lg text-label-lg text-primary hover:text-surface-tint hover:underline transition-colors" href="#">Log in</a>
</p>
</div>
</div>
